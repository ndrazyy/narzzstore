<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>QRIS NDRAZYY AUTO</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }
    img {
      margin-top: 15px;
      width: 200px;
      display: none;
    }
    .result {
      margin-top: 10px;
      font-size: 13px;
      color: #a5f3fc;
      word-break: break-word;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>QRIS AUTO FIX</h3>

  <div id="result" class="result">
    ⏳ Menunggu transaksi aktif...
  </div>

  <img id="qr" />
</div>

<script>
let currentTrx = null;
let intervalCheck = null;

const APIKEY = "yo_sec_4c4963b6313094f34e1f4d6a472186de";

// 🔒 SESSION USER
function getSession() {
  let s = localStorage.getItem("qris_session");
  if (!s) {
    s = "USR-" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("qris_session", s);
  }
  return s;
}

// 📦 LOAD SAAT BUKA WEB
window.onload = () => {
  const session = getSession();
  const saved = localStorage.getItem("qris_trx_" + session);

  if (!saved) {
    document.getElementById("result").innerHTML =
      "⚠️ Belum ada transaksi aktif";
    return;
  }

  const trx = JSON.parse(saved);
  currentTrx = trx.trx_id;

  const qr = document.getElementById("qr");
  qr.src = trx.qr_image;
  qr.style.display = "block";

  document.getElementById("result").innerHTML = `
    ♻️ TRANSAKSI AKTIF<br>
    🆔 ${trx.trx_id}<br>
    💰 Rp ${trx.amount}<br>
    ⏳ Menunggu pembayaran...
  `;

  startCheck();
};

// 🔄 CHECK STATUS
function startCheck() {
  if (intervalCheck) clearInterval(intervalCheck);

  intervalCheck = setInterval(async () => {

    if (!currentTrx) return;

    const res = await fetch(
      `https://yogateway.id/api.php?action=checkstatus&apikey=${APIKEY}&trxid=${currentTrx}`
    );

    const data = await res.json();

    if (!data || !data.data) return;

    const status = data.data.status;
    const session = getSession();

    // ✅ SUCCESS
    if (status === "SUCCESS") {
      clearInterval(intervalCheck);

      localStorage.removeItem("qris_trx_" + session);

      document.getElementById("qr").style.display = "none";

      document.getElementById("result").innerHTML =
        "✅ TRANSAKSI BERHASIL";

      alert("Pembayaran sukses!");
    }

    // ❌ EXPIRED
    if (status === "EXPIRED") {
      clearInterval(intervalCheck);

      localStorage.removeItem("qris_trx_" + session);

      document.getElementById("qr").style.display = "none";

      document.getElementById("result").innerHTML =
        "❌ TRANSAKSI EXPIRED";
    }

  }, 5000);
}
</script>

</body>
</html>
