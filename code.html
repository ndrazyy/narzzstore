<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Test QRIS YogaGateway</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    img {
      margin-top: 15px;
      width: 200px;
    }
    .result {
      margin-top: 10px;
      font-size: 12px;
      color: #a5f3fc;
      word-break: break-word;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>YogaGateway QRIS Test</h3>

  <input id="apikey" placeholder="API KEY YogaGateway">
  <input id="amount" type="number" placeholder="Nominal (contoh 1000)">

  <button onclick="createQR()">Buat QRIS</button>

  <div id="result" class="result"></div>
  <img id="qr" />
</div>

<script>
async function createQR() {
  const apikey = document.getElementById("apikey").value;
  const amount = document.getElementById("amount").value;

  document.getElementById("result").innerText = "Loading...";

  try {
    const res = await fetch(
      `https://yogateway.id/api.php?action=createpayment&apikey=${apikey}&amount=${amount}`
    );

    const data = await res.json();

    console.log(data);

    if (!data || data.status !== "success") {
      document.getElementById("result").innerText = "Gagal: " + JSON.stringify(data);
      return;
    }

    document.getElementById("result").innerText =
      "TRX ID: " + data.data.trxid;

    if (data.data.qr_image) {
      document.getElementById("qr").src = data.data.qr_image;
    }

  } catch (e) {
    document.getElementById("result").innerText = "Error: " + e.message;
  }
}
</script>

</body>
    </html>
