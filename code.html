<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <title>QRIS NDRAZYY</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    img {
      margin-top: 15px;
      width: 200px;
    }
    .result {
      margin-top: 10px;
      font-size: 12px;
      color: #a5f3fc;
      word-break: break-word;
    }
  </style>
</head>
<body><div class="box">
  <h3>YogaGateway QRIS</h3>  <input id="apikey" placeholder="API KEY">
  <input id="amount" type="number" placeholder="Nominal (contoh 1000)"><button onclick="createQR()">Buat QRIS</button>

  <div id="result" class="result"></div>
  <img id="qr" />
</div><script>
let currentTrx = null;
let intervalCheck = null;

async function createQR() {
  const apikey = document.getElementById("apikey").value;
  const amount = document.getElementById("amount").value;

  document.getElementById("result").innerText = "⏳ Membuat QRIS...";

  try {
    const res = await fetch(
      `https://yogateway.id/api.php?action=createpayment&apikey=${apikey}&amount=${amount}`
    );

    const data = await res.json();
    console.log(data);

    // ✅ FIX STATUS
    if (!data || data.status !== true) {
      document.getElementById("result").innerText =
        "❌ Gagal: " + JSON.stringify(data);
      return;
    }

    const trx = data.data;
    currentTrx = trx.trx_id;

    document.getElementById("result").innerHTML = `
      🆔 TRX: ${trx.trx_id}<br>
      💰 Rp ${amount}<br>
      ⏰ Expired: ${trx.expired_at}<br>
      🔄 Menunggu pembayaran...
    `;

    document.getElementById("qr").src = trx.qr_image;

    // 🔥 AUTO CEK STATUS TIAP 5 DETIK
    if (intervalCheck) clearInterval(intervalCheck);

    intervalCheck = setInterval(() => {
      checkStatus(apikey);
    }, 5000);

  } catch (e) {
    document.getElementById("result").innerText = "❌ Error: " + e.message;
  }
}

async function checkStatus(apikey) {
  if (!currentTrx) return;

  try {
    const res = await fetch(
      `https://yogateway.id/api.php?action=checkstatus&apikey=${apikey}&trxid=${currentTrx}`
    );

    const data = await res.json();
    console.log("STATUS:", data);

    if (!data || !data.data) return;

    const status = data.data.status;

    if (status === "SUCCESS") {
      clearInterval(intervalCheck);

      document.getElementById("result").innerHTML = `
        ✅ PEMBAYARAN BERHASIL<br>
        🆔 ${currentTrx}
      `;

      alert("Pembayaran berhasil!");
    }

    if (status === "EXPIRED") {
      clearInterval(intervalCheck);

      document.getElementById("result").innerHTML = `
        ❌ QRIS EXPIRED
      `;
    }

  } catch (e) {
    console.log(e);
  }
}
</script></body>
</html>
