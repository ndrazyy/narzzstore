<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>QRIS NDRAZYY AUTO FIX</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    img {
      margin-top: 15px;
      width: 200px;
    }
    .result {
      margin-top: 10px;
      font-size: 12px;
      color: #a5f3fc;
      word-break: break-word;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>QRIS AUTO FIX</h3>

  <input id="apikey" placeholder="API KEY">
  <input id="amount" type="number" placeholder="Nominal (contoh 1000)">

  <button onclick="createQR()">Buat QRIS</button>

  <div id="result" class="result">⏳ Menunggu...</div>
  <img id="qr" />
</div>

<script>
let currentTrx = null;
let intervalCheck = null;

// 🔒 SESSION 1 USER 1 QR
function getSession() {
  let s = localStorage.getItem("qris_session");
  if (!s) {
    s = "USR-" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("qris_session", s);
  }
  return s;
}

window.onload = () => {
  const saved = localStorage.getItem("qris_trx_" + getSession());

  if (saved) {
    const trx = JSON.parse(saved);

    currentTrx = trx.trx_id;

    document.getElementById("qr").src = trx.qr_image;

    document.getElementById("result").innerHTML = `
      ♻️ QRIS AKTIF (1 USER 1 QR)<br>
      🆔 ${trx.trx_id}<br>
      💰 Rp ${trx.amount}
    `;

    startCheck();
  }
};

async function createQR() {
  const apikey = document.getElementById("apikey").value;
  const amount = document.getElementById("amount").value;

  if (!apikey || !amount) {
    document.getElementById("result").innerText =
      "❌ APIKEY & nominal wajib diisi";
    return;
  }

  const session = getSession();

  // 🔥 CEK QR LAMA
  const saved = localStorage.getItem("qris_trx_" + session);
  if (saved) {
    const trx = JSON.parse(saved);

    currentTrx = trx.trx_id;
    document.getElementById("qr").src = trx.qr_image;

    document.getElementById("result").innerHTML = `
      ♻️ QRIS SUDAH ADA<br>
      🆔 ${trx.trx_id}
    `;

    startCheck();
    return;
  }

  document.getElementById("result").innerText = "⏳ Membuat QRIS...";

  try {
    const res = await fetch(
      `https://yogateway.id/api.php?action=createpayment&apikey=${apikey}&amount=${amount}`
    );

    const data = await res.json();

    if (!data || data.status !== true) {
      document.getElementById("result").innerText =
        "❌ Gagal create QRIS";
      return;
    }

    const trx = data.data;
    currentTrx = trx.trx_id;

    // 💾 SIMPAN PER USER
    localStorage.setItem(
      "qris_trx_" + session,
      JSON.stringify({
        trx_id: trx.trx_id,
        qr_image: trx.qr_image,
        amount: amount
      })
    );

    document.getElementById("qr").src = trx.qr_image;

    document.getElementById("result").innerHTML = `
      🆔 ${trx.trx_id}<br>
      💰 Rp ${amount}<br>
      🔒 1 USER = 1 QRIS
    `;

    startCheck();

  } catch (e) {
    document.getElementById("result").innerText =
      "❌ Error: " + e.message;
  }
}

function startCheck() {
  const apikey = document.getElementById("apikey").value;

  if (intervalCheck) clearInterval(intervalCheck);

  intervalCheck = setInterval(async () => {
    if (!currentTrx) return;

    const res = await fetch(
      `https://yogateway.id/api.php?action=checkstatus&apikey=${apikey}&trxid=${currentTrx}`
    );

    const data = await res.json();

    if (!data || !data.data) return;

    const status = data.data.status;

    if (status === "SUCCESS") {
      clearInterval(intervalCheck);

      localStorage.removeItem("qris_trx_" + getSession());

      document.getElementById("result").innerHTML =
        "✅ PEMBAYARAN BERHASIL";

      alert("Pembayaran sukses!");
    }

    if (status === "EXPIRED") {
      clearInterval(intervalCheck);

      localStorage.removeItem("qris_trx_" + getSession());

      document.getElementById("result").innerHTML =
        "❌ QRIS EXPIRED";
    }
  }, 5000);
}
</script>

</body>
</html>
